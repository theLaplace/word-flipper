<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Vowel Movement</title>

  <style>
    :root {
      --bg: #121213;
      --panel: #1f2023;
      --tile: #2f3136;
      --tile-border: #4a4d55;
      --text: #f5f5f5;
      --muted: #a7a7a7;
      --green: #538d4e;
      --yellow: #b59f3b;
      --error: #ff5c5c;
      --button: #3a3d45;
      --button-hover: #4b4f59;
      --modal-bg: rgba(0, 0, 0, 0.7);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #2a2a2a;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 1px;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
      margin-top: 6px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin: 20px 0 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .difficulty-control {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .difficulty-control select {
      border: none;
      background: var(--button);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
      outline: none;
    }

    .difficulty-control select:hover {
      background: var(--button-hover);
    }

    .mobile-keyboard-input {
      position: fixed;
      left: 50%;
      bottom: env(keyboard-inset-height, 0px);
      width: 1px;
      height: 1px;
      opacity: 0;
      border: none;
      background: transparent;
      color: transparent;
      caret-color: transparent;
      pointer-events: none;
      transform: translateX(-50%);
      z-index: 1;
    }

    .board.keyboard-active {
      scroll-margin-bottom: 45vh;
    }

    .word-row.input-row {
      scroll-margin-bottom: 45vh;
    }

    button {
      border: none;
      background: var(--button);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.15s ease;
    }

    button:hover {
      background: var(--button-hover);
      transform: translateY(-1px);
    }

    .notification {
      min-height: 26px;
      margin-top: 10px;
      color: var(--error);
      font-weight: 700;
      text-align: center;
    }

    .game-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 10px 20px 40px;
      display: flex;
      justify-content: center;
    }

    .board {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .word-row {
      display: grid;
      grid-template-columns: repeat(5, 58px);
      gap: 8px;
      justify-content: center;
    }

    .tile {
      width: 58px;
      height: 58px;
      border-radius: 10px;
      background: var(--tile);
      border: 2px solid var(--tile-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 800;
      text-transform: uppercase;
      user-select: none;
    }

    .tile.correct {
      background: var(--green);
      border-color: var(--green);
      color: white;
    }

    .tile.input {
      background: #17181a;
      border-color: #5b5f6b;
    }

    .tile.input.active {
      border-color: white;
    }

    .tile.locked {
      background: var(--tile);
    }

    .row-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 8px;
      margin-bottom: -4px;
    }

    .target-spacer {
      height: 12px;
    }

    .target-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 16px;
      margin-bottom: -4px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: var(--modal-bg);
      z-index: 20;
      padding: 20px;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 420px;
      background: var(--panel);
      border: 1px solid #3a3d45;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.45);
    }

    .modal h2 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    .modal p {
      color: var(--muted);
      line-height: 1.4;
    }

    .field {
      margin: 14px 0;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .field input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 2px solid #4a4d55;
      background: #121213;
      color: var(--text);
      font-size: 18px;
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: 2px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .share-grid {
      font-family: monospace;
      white-space: pre;
      background: #121213;
      padding: 14px;
      border-radius: 12px;
      margin: 16px 0;
      line-height: 1.4;
      overflow-x: auto;
    }

    .success-text {
      color: var(--green);
      font-weight: 800;
    }

    @media (max-width: 390px) {
      .word-row {
        grid-template-columns: repeat(5, 48px);
        gap: 6px;
      }

      .tile {
        width: 48px;
        height: 48px;
        font-size: 24px;
        border-radius: 8px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Vowel Movement</h1>
    <div class="sub">Change one letter at a time to reach the target word.</div>
  </header>

  <div class="controls">
    <button id="resetBtn">Reset</button>
    <button id="nextBtn">Generate Next</button>
    <button id="customBtn">Custom Game</button>

    <label class="difficulty-control" for="difficultySelect">
      Difficulty
      <select id="difficultySelect">
        <option value="easy">Easy</option>
        <option value="medium" selected>Medium</option>
        <option value="hard">Hard</option>
        <option value="expert">Expert</option>
        <option value="any">Any</option>
      </select>
    </label>
  </div>

  <input
    id="mobileKeyboardInput"
    class="mobile-keyboard-input"
    type="text"
    inputmode="latin"
    autocomplete="off"
    autocorrect="off"
    autocapitalize="none"
    enterkeyhint="go"
    spellcheck="false"
    maxlength="5"
    aria-hidden="true"
  />

  <div id="notification" class="notification"></div>

  <main class="game-wrapper">
    <div id="board" class="board"></div>
  </main>

  <!-- Custom Game Modal -->
  <div id="customModal" class="modal-backdrop">
    <div class="modal">
      <h2>Custom Game</h2>
      <p>Enter a valid five-letter starting word and target word.</p>

      <div class="field">
        <label for="customStart">Starting word</label>
        <input id="customStart" maxlength="5" autocomplete="off" />
      </div>

      <div class="field">
        <label for="customTarget">Target word</label>
        <input id="customTarget" maxlength="5" autocomplete="off" />
      </div>

      <div id="customError" class="notification"></div>

      <div class="modal-actions">
        <button id="closeCustomBtn">Cancel</button>
        <button id="startCustomBtn">Start Game</button>
      </div>
    </div>
  </div>

  <!-- Share Modal -->
  <div id="shareModal" class="modal-backdrop">
    <div class="modal">
      <h2 class="success-text">Solved!</h2>
      <p id="shareSummary"></p>

      <div id="shareGrid" class="share-grid"></div>

      <div class="modal-actions">
        <button id="copyShareBtn">Copy</button>
        <button id="closeShareBtn">Close</button>
      </div>
    </div>
  </div>

    const wordSet = new Set(WORDS);

    /*
      Word graph and difficulty logic:
      - Random games only choose start and target words with a valid one-letter-change path.
      - Difficulty is controlled by shortest solution length, measured in required guesses/changes.
      - Custom games are intentionally not restricted by this graph.
      - Update these ranges any time you want to adjust the game difficulty.
    */

    const DIFFICULTY_SETTINGS = {
      easy: {
        label: "Easy",
        minGuesses: 3,
        maxGuesses: 4,
        minLetterDifferences: 3
      },
      medium: {
        label: "Medium",
        minGuesses: 5,
        maxGuesses: 7,
        minLetterDifferences: 3
      },
      hard: {
        label: "Hard",
        minGuesses: 8,
        maxGuesses: 10,
        minLetterDifferences: 3
      },
      expert: {
        label: "Expert",
        minGuesses: 11,
        maxGuesses: 15,
        minLetterDifferences: 3
      },
      any: {
        label: "Any",
        minGuesses: 3,
        maxGuesses: Infinity,
        minLetterDifferences: 3
      }
    };

    let selectedDifficulty = "medium";

    /*
      Current possible random word combinations in this word list:
      - Easy: 17,266
      - Medium: 65,659
      - Hard: 101,194
      - Expert: 145,445
      - Any: 439,551
    */

    function buildPatternBuckets(words) {
      const buckets = new Map();

      words.forEach(word => {
        for (let i = 0; i < 5; i++) {
          const pattern = word.slice(0, i) + "*" + word.slice(i + 1);

          if (!buckets.has(pattern)) {
            buckets.set(pattern, []);
          }

          buckets.get(pattern).push(word);
        }
      });

      return buckets;
    }

    function getOneLetterNeighbours(word, buckets) {
      const neighbours = new Set();

      for (let i = 0; i < 5; i++) {
        const pattern = word.slice(0, i) + "*" + word.slice(i + 1);
        const matches = buckets.get(pattern) || [];

        matches.forEach(match => {
          if (match !== word) {
            neighbours.add(match);
          }
        });
      }

      return [...neighbours];
    }

    function buildNeighbourMap(words, buckets) {
      const neighbourMap = new Map();

      words.forEach(word => {
        neighbourMap.set(word, getOneLetterNeighbours(word, buckets));
      });

      return neighbourMap;
    }

    function buildValidRandomWordPairsByDifficulty(words, neighbourMap, difficultySettings) {
      const validPairsByDifficulty = {};
      const wordIndexes = new Map(words.map((word, index) => [word, index]));

      Object.keys(difficultySettings).forEach(key => {
        validPairsByDifficulty[key] = [];
      });

      words.forEach(start => {
        const distances = new Map([[start, 0]]);
        const queue = [start];
        let queueIndex = 0;

        while (queueIndex < queue.length) {
          const current = queue[queueIndex];
          queueIndex += 1;

          const currentDistance = distances.get(current);
          const neighbours = neighbourMap.get(current) || [];

          neighbours.forEach(neighbour => {
            if (!distances.has(neighbour)) {
              const nextDistance = currentDistance + 1;
              distances.set(neighbour, nextDistance);
              queue.push(neighbour);
            }
          });
        }

        distances.forEach((distance, target) => {
          if (
            distance <= 0 ||
            wordIndexes.get(start) >= wordIndexes.get(target)
          ) {
            return;
          }

          Object.entries(difficultySettings).forEach(([difficultyKey, settings]) => {
            const meetsMinGuesses = distance >= settings.minGuesses;
            const meetsMaxGuesses = distance <= settings.maxGuesses;
            const meetsLetterDifference =
              countDifferences(start, target) >= settings.minLetterDifferences;

            if (meetsMinGuesses && meetsMaxGuesses && meetsLetterDifference) {
              validPairsByDifficulty[difficultyKey].push({
                start,
                target,
                shortestPathLength: distance
              });
            }
          });
        });
      });

      return validPairsByDifficulty;
    }

    const patternBuckets = buildPatternBuckets(WORDS);
    const neighbourMap = buildNeighbourMap(WORDS, patternBuckets);
    const validRandomWordPairsByDifficulty = buildValidRandomWordPairsByDifficulty(
      WORDS,
      neighbourMap,
      DIFFICULTY_SETTINGS
    );

    function getRandomConnectedWordPair() {
      const validPairs = validRandomWordPairsByDifficulty[selectedDifficulty] || [];

      if (validPairs.length === 0) {
        return null;
      }

      const pair = validPairs[Math.floor(Math.random() * validPairs.length)];

      if (Math.random() < 0.5) {
        return pair;
      }

      return {
        start: pair.target,
        target: pair.start,
        shortestPathLength: pair.shortestPathLength
      };
    }

    function randomWord() {
      return WORDS[Math.floor(Math.random() * WORDS.length)];
    }

    function generateRandomGame() {
      const pair = getRandomConnectedWordPair();

      if (!pair) {
        showNotification(`Could not find a ${DIFFICULTY_SETTINGS[selectedDifficulty].label} word pair`);
        return;
      }

      startGame(pair.start, pair.target);
    }

    function startGame(start, target) {
      startWord = start.toLowerCase();
      targetWord = target.toLowerCase();
      currentWord = startWord;
      currentInput = "";
      guesses = [];
      gameSolved = false;

      closeShareModal();
      clearNotification();
      renderBoard();
    }

    function resetGame() {
      startGame(startWord, targetWord);
    }

    function renderBoard() {
      board.innerHTML = "";

      const startLabel = createLabel("Start");
      board.appendChild(startLabel);
      board.appendChild(createWordRow(startWord, "locked"));

      guesses.forEach(word => {
        board.appendChild(createWordRow(word, "locked"));
      });

      if (!gameSolved) {
        board.appendChild(createWordRow(currentInput.padEnd(5, " "), "input"));
      }

      const targetLabel = createLabel("Target");
      targetLabel.classList.add("target-label");
      board.appendChild(targetLabel);
      board.appendChild(createWordRow(targetWord, "locked"));

      syncMobileKeyboardInput();

      if (document.activeElement === mobileKeyboardInput && !gameSolved) {
        keepInputRowVisible();
      }
    }

    function createLabel(text) {
      const label = document.createElement("div");
      label.className = "row-label";
      label.textContent = text;
      return label;
    }

    function createWordRow(word, type) {
      const row = document.createElement("div");
      row.className = "word-row";

      if (type === "input") {
        row.classList.add("input-row");
        row.addEventListener("click", focusMobileKeyboard);
        row.addEventListener("touchstart", focusMobileKeyboard, { passive: true });
        row.addEventListener("pointerdown", focusMobileKeyboard);
      }

      for (let i = 0; i < 5; i++) {
        const tile = document.createElement("div");
        tile.className = `tile ${type}`;

        const letter = word[i] === " " ? "" : word[i];
        tile.textContent = letter;

        if (letter && letter === targetWord[i]) {
          tile.classList.add("correct");
        }

        if (type === "input" && i === currentInput.length && currentInput.length < 5) {
          tile.classList.add("active");
        }

        row.appendChild(tile);
      }

      return row;
    }

    function isGameplayInputBlocked() {
      return (
        gameSolved ||
        customModal.classList.contains("show") ||
        shareModal.classList.contains("show")
      );
    }

    function getInputRow() {
      return board.querySelector(".input-row");
    }

    function isMobileLikeDevice() {
      return (
        "ontouchstart" in window ||
        navigator.maxTouchPoints > 0 ||
        window.matchMedia("(pointer: coarse)").matches
      );
    }

    function focusMobileKeyboard() {
      if (isGameplayInputBlocked()) {
        return;
      }

      clearTimeout(pendingMobileFocusTimer);

      mobileKeyboardInput.value = currentInput;
      lastMobileInputValue = currentInput;
      mobileKeyboardInput.focus({ preventScroll: true });

      keepInputRowVisible();

      pendingMobileFocusTimer = setTimeout(() => {
        if (!isGameplayInputBlocked()) {
          mobileKeyboardInput.focus({ preventScroll: true });
          keepInputRowVisible();
        }
      }, 80);
    }

    function syncMobileKeyboardInput() {
      if (gameSolved) {
        mobileKeyboardInput.value = "";
        lastMobileInputValue = "";
        board.classList.remove("keyboard-active");
        return;
      }

      mobileKeyboardInput.value = currentInput;
      lastMobileInputValue = currentInput;
    }

    function sanitizeMobileValue(value) {
      return value
        .toLowerCase()
        .replace(/[^a-z]/g, "")
        .slice(0, 5);
    }

    function handleMobileKeyboardInput(event) {
      if (isGameplayInputBlocked()) {
        event.target.value = "";
        lastMobileInputValue = "";
        return;
      }

      const rawValue = event.target.value;
      const sanitizedValue = sanitizeMobileValue(rawValue);

      currentInput = sanitizedValue;
      event.target.value = sanitizedValue;
      lastMobileInputValue = sanitizedValue;

      clearNotification();
      renderBoard();
      keepInputRowVisible();
    }

    function handleMobileKeyboardBeforeInput(event) {
      if (isGameplayInputBlocked()) {
        event.preventDefault();
        return;
      }

      if (event.inputType === "insertLineBreak") {
        event.preventDefault();
        submitInput();
        return;
      }

      if (event.inputType === "deleteContentBackward") {
        event.preventDefault();
        currentInput = currentInput.slice(0, -1);
        renderBoard();
        keepInputRowVisible();
        return;
      }

      if (event.data && !/^[a-zA-Z]$/.test(event.data)) {
        event.preventDefault();
        return;
      }

      if (event.inputType === "insertText" && currentInput.length >= 5) {
        event.preventDefault();
      }
    }

    function handleMobileKeyboardKeydown(event) {
      if (isGameplayInputBlocked()) {
        event.preventDefault();
        return;
      }

      if (event.key === "Backspace") {
        event.preventDefault();
        currentInput = currentInput.slice(0, -1);
        renderBoard();
        keepInputRowVisible();
        return;
      }

      if (event.key === "Enter") {
        event.preventDefault();
        submitInput();
        return;
      }

      if (event.key.length === 1 && !/^[a-zA-Z]$/.test(event.key)) {
        event.preventDefault();
      }
    }

    function keepInputRowVisible() {
      if (gameSolved) {
        return;
      }

      const inputRow = getInputRow();

      if (!inputRow) {
        return;
      }

      board.classList.add("keyboard-active");

      requestAnimationFrame(() => {
        inputRow.scrollIntoView({
          behavior: "smooth",
          block: "center",
          inline: "nearest"
        });
      });
    }

    function handleVisualViewportChange() {
      if (
        document.activeElement !== mobileKeyboardInput ||
        isGameplayInputBlocked()
      ) {
        return;
      }

      clearTimeout(viewportSettleTimer);

      keepInputRowVisible();

      viewportSettleTimer = setTimeout(() => {
        keepInputRowVisible();
      }, 180);
    }

    function handleMobileKeyboardBlur() {
      board.classList.remove("keyboard-active");
    }

    function handleKeydown(event) {
      if (event.target === mobileKeyboardInput) {
        return;
      }

      if (gameSolved) {
        return;
      }

      const key = event.key;

      if (key === "Enter") {
        event.preventDefault();

        if (customModal.classList.contains("show") || shareModal.classList.contains("show")) {
          return;
        }

        submitInput();
        return;
      }

      if (customModal.classList.contains("show") || shareModal.classList.contains("show")) {
        return;
      }

      if (/^[a-zA-Z]$/.test(key)) {
        event.preventDefault();

        if (currentInput.length < 5) {
          currentInput += key.toLowerCase();
          clearNotification();
          renderBoard();

          if (isMobileLikeDevice()) {
            keepInputRowVisible();
          }
        }

        return;
      }

      if (key === "Backspace") {
        event.preventDefault();
        currentInput = currentInput.slice(0, -1);
        renderBoard();

        if (isMobileLikeDevice()) {
          keepInputRowVisible();
        }

        return;
      }

      if (key.length === 1) {
        event.preventDefault();
      }
    }

    function submitInput() {
      if (gameSolved) {
        return;
      }

      const guess = currentInput.toLowerCase();

      if (guess.length !== 5) {
        showNotification("Enter a 5 letter word");
        return;
      }

      if (!wordSet.has(guess)) {
        currentInput = "";
        showNotification("Not a valid word in list");
        renderBoard();
        return;
      }

      const diff = countDifferences(currentWord, guess);

      if (diff === 0) {
        currentInput = "";
        showNotification("You must change 1 letter");
        renderBoard();
        return;
      }

      if (diff > 1) {
        currentInput = "";
        showNotification("More than 1 letter changed");
        renderBoard();
        return;
      }

      guesses.push(guess);
      currentWord = guess;
      currentInput = "";

      clearNotification();

      if (guess === targetWord) {
        gameSolved = true;
        renderBoard();
        showShareModal();
        return;
      }

      renderBoard();
    }

    function countDifferences(a, b) {
      let diff = 0;

      for (let i = 0; i < 5; i++) {
        if (a[i] !== b[i]) {
          diff++;
        }
      }

      return diff;
    }

    function hasEnoughDifferenceForRandomGame(start, target) {
      return countDifferences(start, target) >= 3;
    }

    function showNotification(message) {
      notification.textContent = message;
    }

    function clearNotification() {
      notification.textContent = "";
    }

    function openCustomModal() {
      customStart.value = "";
      customTarget.value = "";
      customError.textContent = "";
      customModal.classList.add("show");
      customStart.focus();
    }

    function closeCustomModal() {
      customModal.classList.remove("show");
    }

    function startCustomGame() {
      const start = customStart.value.trim().toLowerCase();
      const target = customTarget.value.trim().toLowerCase();

      if (!isValidCustomWord(start)) {
        customError.textContent = "Starting word is not a valid word in list";
        return;
      }

      if (!isValidCustomWord(target)) {
        customError.textContent = "Target word is not a valid word in list";
        return;
      }

      if (start === target) {
        customError.textContent = "Starting word and target word must be different";
        return;
      }

      closeCustomModal();
      startGame(start, target);
    }

    function isValidCustomWord(word) {
      return /^[a-z]{5}$/.test(word) && wordSet.has(word);
    }

    function getCurrentDifficultyLabel() {
      return DIFFICULTY_SETTINGS[selectedDifficulty]?.label || "Custom";
    }

    function showShareModal() {
      const shareText = buildShareText();

      shareSummary.textContent = `Solved in ${guesses.length} guesses on ${getCurrentDifficultyLabel()} difficulty.`;
      shareGrid.textContent = shareText;

      shareModal.classList.add("show");
    }

    function closeShareModal() {
      shareModal.classList.remove("show");
    }

    function buildShareText() {
      const rows = [startWord, ...guesses];

      const emojiRows = rows.map(word => {
        return word
          .split("")
          .map((letter, index) => letter === targetWord[index] ? "🟩" : "⬛")
          .join("");
      });

      return [
        `Vowel Movement`,
        `${startWord.toUpperCase()} → ${targetWord.toUpperCase()}`,
        `${getCurrentDifficultyLabel()} difficulty`,
        `${guesses.length} guesses`,
        "",
        ...emojiRows
      ].join("\n");
    }

    async function copyShareText() {
      const text = shareGrid.textContent;

      try {
        await navigator.clipboard.writeText(text);
        copyShareBtn.textContent = "Copied!";
        setTimeout(() => {
          copyShareBtn.textContent = "Copy";
        }, 1200);
      } catch {
        copyShareBtn.textContent = "Copy failed";
        setTimeout(() => {
          copyShareBtn.textContent = "Copy";
        }, 1200);
      }
    }

    resetBtn.addEventListener("click", resetGame);
    nextBtn.addEventListener("click", generateRandomGame);
    customBtn.addEventListener("click", openCustomModal);

    difficultySelect.addEventListener("change", event => {
      selectedDifficulty = event.target.value;
      closeShareModal();
      generateRandomGame();
    });

    board.addEventListener("click", focusMobileKeyboard);
    mobileKeyboardInput.addEventListener("input", handleMobileKeyboardInput);
    mobileKeyboardInput.addEventListener("beforeinput", handleMobileKeyboardBeforeInput);
    mobileKeyboardInput.addEventListener("keydown", handleMobileKeyboardKeydown);
    mobileKeyboardInput.addEventListener("blur", handleMobileKeyboardBlur);

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", handleVisualViewportChange);
      window.visualViewport.addEventListener("scroll", handleVisualViewportChange);
    }

    closeCustomBtn.addEventListener("click", closeCustomModal);
    startCustomBtn.addEventListener("click", startCustomGame);

    closeShareBtn.addEventListener("click", closeShareModal);
    copyShareBtn.addEventListener("click", copyShareText);

    document.addEventListener("keydown", handleKeydown, true);

    customStart.addEventListener("input", () => {
      customStart.value = customStart.value.replace(/[^a-zA-Z]/g, "").slice(0, 5);
    });

    customTarget.addEventListener("input", () => {
      customTarget.value = customTarget.value.replace(/[^a-zA-Z]/g, "").slice(0, 5);
    });

    generateRandomGame();
  </script>
</body>
</html>
